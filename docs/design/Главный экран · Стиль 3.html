<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Держимся — Главный экран · Стиль 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:"Inter",system-ui,sans-serif;color:#22201c;}
  body{
    background:#e9e4d8;
    background-image: radial-gradient(rgba(0,0,0,.05) 1px, transparent 1px);
    background-size:22px 22px;
    min-height:100vh;
    display:flex; align-items:flex-start; justify-content:center;
    padding:48px 32px 64px;
  }
  .stage{ width:360px; }

  .phone{
    width:100%; aspect-ratio:360/780; background:#0e0d0b;
    border-radius:46px; padding:7px;
    box-shadow:0 30px 60px -20px rgba(40,35,28,.35),0 12px 24px -12px rgba(40,35,28,.18);
    position:relative; overflow:hidden;
  }
  .phone-inner{
    width:100%; height:100%; border-radius:39px;
    background:var(--bg); color:var(--ink);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .island{position:absolute; left:50%; transform:translateX(-50%); top:13px; width:90px; height:25px; background:#0e0d0b; border-radius:14px; z-index:5;}
  .statusbar{height:44px; padding:14px 24px 0; display:flex; align-items:center; justify-content:space-between; font-size:12.5px; font-weight:600; color:var(--sb); flex:0 0 auto; position:relative; z-index:3;}
  .statusbar .right{display:flex; gap:5px; align-items:center;}
  .sig{width:14px;height:9px;background:linear-gradient(to top,currentColor 25%,transparent 25%) 0 100%/2px 25% no-repeat,linear-gradient(to top,currentColor 50%,transparent 50%) 4px 100%/2px 50% no-repeat,linear-gradient(to top,currentColor 75%,transparent 75%) 8px 100%/2px 75% no-repeat,linear-gradient(to top,currentColor 100%,transparent 100%) 12px 100%/2px 100% no-repeat;color:var(--sb);}
  .batt{width:21px;height:10px;border:1.2px solid currentColor;border-radius:3px;position:relative;color:var(--sb);}
  .batt::after{content:"";position:absolute;right:-3px;top:2.5px;width:2px;height:4px;background:currentColor;border-radius:0 1px 1px 0;}
  .batt::before{content:"";position:absolute;inset:1.2px;width:65%;background:currentColor;border-radius:1px;}

  .scroll{ flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column;}

  /* big accent hero */
  .hero{
    background:var(--accent); color:var(--accent-fg);
    border-radius:0 0 30px 30px;
    padding:6px 20px 22px; flex:0 0 auto; position:relative; overflow:hidden;
    margin-top:-44px; padding-top:50px;
  }
  .hero .htop{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .hero .wm{ font-size:16px; font-weight:800; letter-spacing:-.01em;}
  .hero .ava{ width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.18); display:grid; place-items:center; font-weight:700; font-size:14px;}
  .hero-main{ display:flex; align-items:center; justify-content:space-between; gap:14px;}
  .hero h1{ font-size:25px; font-weight:800; letter-spacing:-.025em; line-height:1.06;}
  .hero-mascot{
    width:104px; height:104px; flex:0 0 auto; border-radius:22px;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.10) 0 8px, transparent 8px 16px),
      rgba(255,255,255,.10);
    border:1.4px dashed rgba(255,250,240,.40);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:"JetBrains Mono",monospace; font-size:8.5px; line-height:1.3;
    color:rgba(255,250,240,.8);
  }
  .hero .cta{
    margin-top:15px; height:46px; width:100%;
    background:rgba(255,255,255,.95); color:var(--accent);
    border:none; border-radius:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:14px; font-weight:700;
  }
  .hero .cta svg{ width:17px; height:17px;}

  /* metrics overlapping row */
  .metrics{
    margin:-16px 16px 0; flex:0 0 auto; position:relative; z-index:2;
    background:var(--card); border-radius:18px; padding:12px 6px;
    display:grid; grid-template-columns:repeat(4,1fr);
    box-shadow:0 14px 30px -16px rgba(42,32,23,.5);
  }
  .metrics .m{ display:flex; flex-direction:column; align-items:center; gap:5px; border-right:1px solid var(--card-border);}
  .metrics .m:last-child{ border-right:none;}
  .metrics .m .ic{ width:28px; height:28px; border-radius:9px; display:grid; place-items:center;}
  .metrics .m .ic svg{ width:15px; height:15px;}
  .metrics .m .val{ font-size:14px; font-weight:800; letter-spacing:-.02em;}
  .metrics .m .lab{ font-size:8.5px; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
  .ic.moon{ background:var(--moon-bg); color:var(--moon);}
  .ic.heart{ background:var(--heart-bg); color:var(--heart);}
  .ic.fire{ background:#f4d6c0; color:#b15a35;}
  .ic.rest{ background:#ecdcb0; color:#8a7642;}

  .body{ padding:18px 16px 0; flex:1; min-height:0; display:flex; flex-direction:column;}
  .sec{ font-size:13px; font-weight:700; letter-spacing:-.01em; margin:0 2px 11px; flex:0 0 auto;}

  .tiles{ display:grid; grid-template-columns:1fr 1fr; gap:11px; flex:0 0 auto;}
  .tile{
    background:var(--card); border-radius:18px; padding:14px;
    box-shadow:0 10px 24px -18px rgba(42,32,23,.45);
    min-height:104px; display:flex; flex-direction:column;
  }
  .tile .ic{ width:40px; height:40px; border-radius:12px; display:grid; place-items:center;}
  .tile .ic svg{ width:20px; height:20px;}
  .ic.t1{ background:var(--accent-bg); color:var(--accent);}
  .ic.t2{ background:var(--gold-bg); color:var(--gold);}
  .ic.t3{ background:var(--ochre-bg); color:var(--ochre);}
  .ic.t4{ background:#f4d6c0; color:#b15a35;}
  .tile b{ font-size:13px; font-weight:700; letter-spacing:-.01em; margin-top:12px; line-height:1.15;}
  .tile em{ font-style:normal; font-size:10.5px; color:var(--ink-soft); margin-top:auto; padding-top:6px;}

  .navwrap{ margin-top:auto; padding:10px 16px 16px; flex:0 0 auto;}
  .nav{
    background:var(--card); border:1px solid var(--card-border);
    border-radius:22px; padding:7px 6px;
    display:grid; grid-template-columns:repeat(3,1fr);
    box-shadow:0 10px 26px -12px rgba(42,32,23,.35);
  }
  .nav .item{ display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 2px; border-radius:14px; color:var(--ink-soft); font-size:10px; font-weight:500;}
  .nav .item svg{ width:20px; height:20px;}
  .nav .item.on{ background:var(--accent-bg); color:var(--accent); font-weight:700;}
  .home{position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:118px; height:5px; border-radius:3px; background:var(--ink); opacity:.8;}

  .esp{
    --bg:#faf6ec; --ink:#2a2017; --ink-soft:#6a5d4d; --ink-faint:#b0a496;
    --card:#fffdf8; --card-border:rgba(42,32,23,.06);
    --gold:#a8842c; --gold-bg:rgba(168,132,44,.16);
    --ochre:#8a7642; --ochre-bg:rgba(138,118,66,.16);
    --moon:#6a5d4d; --moon-bg:#ece2cb;
    --sb:#fffaf0;
  }
  .v-burgundy{
    --accent:#5a6b35; --accent-fg:#fffaf0; --accent-bg:rgba(90,107,53,.12);
    --accent-shadow:0 16px 30px -12px rgba(90,107,53,.5);
    --nav-on:#e2e4c6; --avatar-fg:#5a6b35; --heart:#5a6b35; --heart-bg:#e2e4c6;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="phone-inner esp v-burgundy">
        <div class="island"></div>
        <div class="statusbar"><span>9:41</span><div class="right"><span class="sig"></span><span class="batt"></span></div></div>

        <div class="scroll">
          <div class="hero">
            <div class="htop">
              <span class="wm">Держимся</span>
              <div class="ava">А</div>
            </div>
            <div class="hero-main">
              <h1>Привет,<br>Алиса</h1>
              <div class="hero-mascot">sloth.png<br>placeholder</div>
            </div>
            <button class="cta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14l2 2 4-4"/></svg>Пройти чек-ин</button>
          </div>

          <div class="metrics">
            <div class="m"><div class="ic moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div><div class="val">6.5ч</div><div class="lab">Сон</div></div>
            <div class="m"><div class="ic heart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 15c.83.67 1.83 1 3 1s2.17-.33 3-1"/><line x1="9" y1="10" x2="9.01" y2="10"/><line x1="15" y1="10" x2="15.01" y2="10"/></svg></div><div class="val">85%</div><div class="lab">Сост.</div></div>
            <div class="m"><div class="ic fire"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3.5C9.5 5 12 2 12 2z"/></svg></div><div class="val">15%</div><div class="lab">Выгор.</div></div>
            <div class="m"><div class="ic rest"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12v6a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-6"/><path d="M5 12V8a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v4"/></svg></div><div class="val">40%</div><div class="lab">Отдых</div></div>
          </div>

          <div class="body">
            <div class="sec">Инструменты</div>
            <div class="tiles">
              <div class="tile"><div class="ic t1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><b>Сколько недоплачивают</b><em>вилка по рынку</em></div>
              <div class="tile"><div class="ic t2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8H20l-4.9 3.6 1.9 5.8L12 14.6 7 18.2l1.9-5.8L4 8.8h6.1z"/></svg></div><b>Офисный гороскоп</b><em>расклад на день</em></div>
              <div class="tile"><div class="ic t3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="3"/><circle cx="16" cy="9" r="3"/><path d="M2 20c0-3 2.5-5 6-5M22 20c0-3-2.5-5-6-5"/></svg></div><b>Совместимость</b><em>с боссом по знакам</em></div>
              <div class="tile"><div class="ic t4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><b>Важный разговор</b><em>подготовить с ИИ</em></div>
            </div>
          </div>

          <div class="navwrap">
            <div class="nav">
              <div class="item on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Главная</div>
              <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Функции</div>
              <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Профиль</div>
            </div>
          </div>
        </div>
        <div class="home"></div>
      </div>
    </div>
  </div>
</body>
</html>
