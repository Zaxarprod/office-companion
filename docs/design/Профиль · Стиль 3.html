<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Держимся — Профиль · Стиль 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style3.css">
<style>
  .phero{ background:var(--accent); color:var(--accent-fg); border-radius:0 0 30px 30px; padding:64px 20px 26px; margin-top:-44px; text-align:center; flex:0 0 auto;}
  .phero .pava{ width:84px; height:84px; border-radius:50%; margin:0 auto; background:repeating-linear-gradient(135deg,rgba(255,255,255,.12) 0 7px,transparent 7px 14px),rgba(255,255,255,.16); border:3px solid rgba(255,255,255,.55); display:grid; place-items:center; font-family:"JetBrains Mono",monospace; font-size:10px; color:rgba(255,250,240,.85); position:relative;}
  .phero .pava .cam{ position:absolute; right:-2px; bottom:-2px; width:28px; height:28px; border-radius:50%; background:#fffaf0; color:var(--accent); border:3px solid var(--accent); display:grid; place-items:center;}
  .phero .pava .cam svg{ width:13px; height:13px;}
  .phero .nm{ margin-top:12px; font-size:22px; font-weight:800; letter-spacing:-.02em; display:flex; align-items:center; justify-content:center; gap:8px;}
  .phero .nm .pen{ width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.18); display:grid; place-items:center;}
  .phero .nm .pen svg{ width:12px; height:12px;}
  .blk{ margin-top:16px;}
  .blk .lab{ font-family:"JetBrains Mono",monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); font-weight:600; margin:0 4px 9px;}
  .row{ display:flex; align-items:center; gap:13px; padding:13px 15px; border-bottom:1px solid var(--card-border); cursor:pointer;}
  .row:last-child{ border-bottom:none;}
  .row .ic{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; flex:0 0 auto;}
  .row .ic svg{ width:17px; height:17px;}
  .row .tx{ flex:1; min-width:0;}
  .row .tx .k{ font-size:10px; color:var(--ink-soft); font-weight:500;}
  .row .tx .v{ font-size:14.5px; font-weight:600; margin-top:2px; display:flex; align-items:center; gap:6px;}
  .row .tx .v.empty{ color:var(--ink-faint); font-weight:500;}
  .row .chev{ color:var(--ink-faint);}
  .row .chev svg{ width:16px; height:16px;}
  .upg{ margin-top:16px; background:var(--card); border:1px solid rgba(168,132,44,.32); border-radius:18px; padding:15px 16px; position:relative; overflow:hidden; box-shadow:0 8px 20px -14px rgba(42,32,23,.4);}
  .upg .edge{ position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--gold);}
  .upg .top{ display:flex; align-items:center; gap:12px;}
  .upg .crown{ width:44px; height:44px; border-radius:13px; background:var(--gold-bg); color:var(--gold); display:grid; place-items:center; flex:0 0 auto;}
  .upg .crown svg{ width:23px; height:23px;}
  .upg .plan{ font-family:"JetBrains Mono",monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); font-weight:600;}
  .upg h3{ font-size:17px; font-weight:800; letter-spacing:-.02em; margin-top:2px;}
  .upg .go{ margin-top:13px; width:100%; height:44px; background:var(--accent); color:var(--accent-fg); border:none; border-radius:999px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; font-size:13.5px; font-weight:700; white-space:nowrap; box-shadow:var(--accent-shadow);}
  .upg .go .price{ font-family:"JetBrains Mono",monospace; font-weight:600; opacity:.8; font-size:11.5px;}
  .upg .go svg{ width:14px; height:14px;}
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="phone-inner esp" style="--sb:#fffaf0;">
        <div class="island"></div>
        <div class="statusbar"><span>9:41</span><div class="right"><span class="sig"></span><span class="batt"></span></div></div>

        <div class="scroll">
          <div class="phero">
            <div class="pava">фото<div class="cam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div></div>
            <div class="nm">Алиса <span class="pen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span></div>
          </div>

          <div class="body" style="--sb:#2a2017; padding-top:6px;">
            <div class="blk">
              <div class="lab">Личное</div>
              <div class="card">
                <div class="row"><div class="ic t2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="tx"><div class="k">Дата рождения</div><div class="v">14 сентября 1996</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
                <div class="row"><div class="ic t3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></div><div class="tx"><div class="k">Время рождения</div><div class="v empty">не указано · для точности</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
              </div>
            </div>

            <div class="blk">
              <div class="lab">Работа</div>
              <div class="card">
                <div class="row"><div class="ic t1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></div><div class="tx"><div class="k">Страна</div><div class="v">🇷🇺 Россия</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
                <div class="row"><div class="ic t4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="tx"><div class="k">Город</div><div class="v">Москва</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
                <div class="row"><div class="ic t1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div><div class="tx"><div class="k">Профессия</div><div class="v">Frontend-разработчик</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
                <div class="row"><div class="ic t3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="tx"><div class="k">Должность / грейд</div><div class="v">Senior</div></div><span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></div>
              </div>
            </div>
          </div>

          <div class="navwrap">
            <div class="nav">
              <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Главная</div>
              <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Функции</div>
              <div class="item on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Профиль</div>
            </div>
          </div>
        </div>
        <div class="home"></div>
      </div>
    </div>
  </div>
</body>
</html>
