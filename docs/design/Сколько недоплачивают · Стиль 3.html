<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Держимся — Сколько недоплачивают · Стиль 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style3.css">
<style>
  .top{ background:var(--accent); color:var(--accent-fg); padding:56px 20px 36px; margin-top:-44px; border-radius:0 0 36px 8px; position:relative; overflow:hidden; flex:0 0 auto;}
  .top::after{ content:""; position:absolute; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.08); top:-44px; right:-40px;}
  .top .row{ display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2;}
  .top .ttl{ font-size:13px; font-weight:600;}
  .top .x{ width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.18); display:grid; place-items:center; cursor:pointer;}
  .top .x svg{ width:15px; height:15px;}

  .medcard{ margin:-22px 16px 0; background:var(--card); border-radius:22px; padding:16px; box-shadow:0 18px 36px -20px rgba(42,32,23,.5); position:relative; z-index:3; flex:0 0 auto;}
  .medrow{ display:flex; align-items:flex-end; justify-content:space-between;}
  .medrow .cap{ font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); font-weight:600;}
  .medrow .med{ font-size:34px; font-weight:900; letter-spacing:-.03em; line-height:1; margin-top:4px;}
  .medrow .vk{ text-align:right; font-size:11px; color:var(--ink-soft); line-height:1.3;}
  .medrow .vk b{ display:block; font-size:13px; color:var(--ink); font-weight:700;}

  .hwrap{ margin-top:16px;}
  .arrows{ display:flex; gap:3px; margin-bottom:3px;}
  .arrows span{ flex:1; display:flex; justify-content:center; color:var(--coral);}
  .arrows span svg{ width:15px; height:15px;}
  .histo{ display:flex; align-items:flex-end; gap:3px; height:60px;}
  .histo .b{ flex:1; border-radius:4px 4px 0 0; background:rgba(42,32,23,.10);}
  .histo .b.you{ background:var(--coral);}
  .histo .b.med{ background:var(--accent);}
  .axis{ display:flex; justify-content:space-between; margin-top:7px; font-family:"JetBrains Mono",monospace; font-size:10px; color:var(--ink-faint); font-weight:600;}

  .youline{ margin-top:12px; background:var(--coral-bg); border-radius:12px; padding:9px 12px; font-size:12px;}
  .youline b{ color:#8a3a18; font-weight:700;}

  .tabs{ display:flex; gap:18px; margin:16px 20px 0; border-bottom:1px solid var(--card-border); flex:0 0 auto;}
  .tabs button{ background:none; border:none; padding:0 0 10px; font:600 12.5px "Inter",sans-serif; color:var(--ink-soft); position:relative; cursor:pointer;}
  .tabs button.on{ color:var(--ink);}
  .tabs button.on::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); border-radius:1px;}

  .list{ padding:14px 18px 0; flex:1; min-height:0; display:flex; flex-direction:column; gap:9px;}
  .vac{ background:var(--card); border-radius:16px; padding:11px 13px; box-shadow:0 8px 20px -16px rgba(42,32,23,.4); display:flex; flex-direction:column; gap:8px;}
  .vac .vt{ display:grid; grid-template-columns:32px 1fr auto; gap:10px; align-items:center;}
  .vac .logo{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center; font-family:"JetBrains Mono",monospace; font-weight:700; font-size:13px;}
  .vac .logo.t{ background:rgba(232,222,40,.20); color:#8a7400;}
  .vac .logo.a{ background:rgba(0,170,255,.14); color:#0b6e9a;}
  .vac .role{ font-size:12.5px; font-weight:600;}
  .vac .co{ font-size:10.5px; color:var(--ink-soft); margin-top:1px;}
  .vac .src{ font-family:"JetBrains Mono",monospace; font-size:9px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; padding:3px 7px; border-radius:999px; background:rgba(228,108,30,.15); color:#c25a14;}
  .vac .pay{ display:flex; align-items:center; gap:8px;}
  .vac .pay .p{ font-family:"JetBrains Mono",monospace; font-size:13.5px; font-weight:700;}
  .vac .pay .diff{ font-family:"JetBrains Mono",monospace; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:999px; background:var(--sage-bg); color:var(--sage);}
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="phone-inner esp" style="--sb:#fffaf0;">
        <div class="island"></div>
        <div class="statusbar"><span>9:41</span><div class="right"><span class="sig"></span><span class="batt"></span></div></div>

        <div class="scroll">
          <div class="top">
            <div class="row"><span class="ttl">Senior · Frontend · Москва</span><span class="x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></div>
          </div>

          <div class="medcard" style="--sb:#2a2017;">
            <div class="medrow">
              <div><div class="cap">Медиана</div><div class="med">350 000 ₽</div></div>
              <div class="vk">вилка<b>280–450к</b></div>
            </div>
            <div class="hwrap">
              <div class="arrows"><span></span><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="4" x2="12" y2="18"/><polyline points="7 13 12 18 17 13"/></svg></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="histo">
                <div class="b" style="height:18%"></div><div class="b you" style="height:26%"></div><div class="b" style="height:40%"></div><div class="b" style="height:60%"></div><div class="b" style="height:82%"></div><div class="b med" style="height:100%"></div><div class="b" style="height:88%"></div><div class="b" style="height:62%"></div><div class="b" style="height:42%"></div><div class="b" style="height:24%"></div><div class="b" style="height:12%"></div>
              </div>
              <div class="axis"><span>200к</span><span>350к</span><span>500к</span></div>
            </div>
            <div class="youline"><b>Ты 220к</b> — на 60к ниже минимума вилки.</div>
          </div>

          <div class="tabs">
            <button class="on">Крутые вакансии</button>
            <button>В других городах лучше</button>
          </div>

          <div class="list">
            <div class="vac">
              <div class="vt"><div class="logo t">T</div><div><div class="role">Senior Frontend Engineer</div><div class="co">Тинькофф · Москва</div></div><span class="src">HH</span></div>
              <div class="pay"><span class="p">350–480к ₽</span><span class="diff">+130к ↗</span></div>
            </div>
            <div class="vac">
              <div class="vt"><div class="logo a">A</div><div><div class="role">Senior FE · Avito Pro</div><div class="co">Avito · удалёнка</div></div><span class="src">HH</span></div>
              <div class="pay"><span class="p">от 380к ₽</span><span class="diff">+160к ↗</span></div>
            </div>
          </div>

          <div class="foot">
            <button class="cta-lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> Сохранить отчёт</button>
          </div>
        </div>
        <div class="home"></div>
      </div>
    </div>
  </div>
</body>
</html>
